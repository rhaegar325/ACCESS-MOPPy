codecov:
  require_ci_to_pass: true

coverage:
  precision: 1
  round: nearest
  range: "40...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 90%

ignore:
  - "src/access_moppy/_version.py"
  - "src/access_moppy/dashboard/*"
